<!DOCTYPE html>
<html>

<head>

<title>Create Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container">

<h2>Create Quiz</h2>

<input id="question" class="form-control mb-2" placeholder="Question">

<input id="a" class="form-control mb-2" placeholder="Option A">

<input id="b" class="form-control mb-2" placeholder="Option B">

<input id="c" class="form-control mb-2" placeholder="Option C">

<input id="d" class="form-control mb-2" placeholder="Option D">

<input id="answer" class="form-control mb-2" placeholder="Correct Answer">

<button class="btn btn-success" onclick="saveQuiz()">Save Quiz</button>

</div>

<script src="js/create.js"></script>

</body>

</html>
